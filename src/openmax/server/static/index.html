<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>openMax</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <span class="logo-mark">⚡</span>
        <span class="logo-word">openMax</span>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" onclick="setFilter('all')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
          <span>All tasks</span>
          <span class="nav-count" id="nav-all">0</span>
        </button>
        <button class="nav-item" onclick="setFilter('running')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          <span>Running</span>
          <span class="nav-count" id="nav-running">0</span>
        </button>
        <button class="nav-item" onclick="setFilter('queued')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
          <span>Queued</span>
          <span class="nav-count" id="nav-queued">0</span>
        </button>
        <button class="nav-item" onclick="setFilter('done')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 6L9 17l-5-5"/></svg>
          <span>Completed</span>
          <span class="nav-count" id="nav-done">0</span>
        </button>
      </nav>

      <div class="sidebar-spacer"></div>

      <div class="sidebar-footer">
        <div class="conn-indicator">
          <span class="conn-dot"></span>
          <span class="conn-label">Connecting...</span>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="page-content">
        <header class="page-header">
          <h1 class="page-title" id="page-title">All tasks</h1>
          <div class="header-actions">
            <button class="ghost-btn" onclick="clearDone()">Clear done</button>
          </div>
        </header>

        <div class="stats-row">
          <div class="mini-stat">
            <span class="mini-num" id="stat-queued">0</span>
            <span class="mini-label">queued</span>
          </div>
          <div class="mini-stat">
            <span class="mini-num accent" id="stat-running">0</span>
            <span class="mini-label">running</span>
          </div>
          <div class="mini-stat">
            <span class="mini-num success" id="stat-done">0</span>
            <span class="mini-label">done</span>
          </div>
        </div>

        <div class="task-list"></div>
      </div>

      <div class="input-dock">
        <div class="input-row">
          <input type="text" id="task-input" placeholder="What needs to be done?" autocomplete="off" spellcheck="false">
          <button class="submit-btn" onclick="submitTask()">Submit</button>
        </div>
      </div>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
